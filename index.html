<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOUR STUDIO — 项目地图</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #0d0d0d;
      color: #e8e4dc;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 地图 ── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* ── 顶部品牌栏 ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(10,10,10,0.85) 0%, transparent 100%);
      pointer-events: none;
    }

    #brand {
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
    }

    #logo-mark {
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(232,228,220,0.5);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #e8e4dc;
    }

    #brand-name {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #e8e4dc;
      text-transform: uppercase;
    }

    #project-count {
      font-size: 12px;
      color: rgba(232,228,220,0.45);
      letter-spacing: 0.08em;
      pointer-events: auto;
    }

    /* ── 自定义 marker ── */
    .custom-marker {
      position: relative;
      cursor: pointer;
    }

    .marker-dot {
      width: 12px;
      height: 12px;
      background: #c8a96e;
      border: 2px solid rgba(200,169,110,0.3);
      border-radius: 50%;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .marker-dot:hover {
      transform: scale(1.4);
      box-shadow: 0 0 0 6px rgba(200,169,110,0.15);
    }

    .marker-dot.active {
      background: #e8c97e;
      transform: scale(1.5);
      box-shadow: 0 0 0 8px rgba(232,201,126,0.2);
    }

    .marker-city {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      color: rgba(232,228,220,0.6);
      letter-spacing: 0.06em;
      pointer-events: none;
    }

    /* ── 项目卡片面板 ── */
    #panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 380px;
      background: rgba(14,14,14,0.96);
      border-left: 1px solid rgba(232,228,220,0.08);
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel.open {
      transform: translateX(0);
    }

    #panel-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      opacity: 0.85;
    }

    #panel-image-placeholder {
      width: 100%;
      height: 220px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(232,228,220,0.2);
      font-size: 13px;
    }

    #panel-body {
      padding: 28px 28px 24px;
      flex: 1;
      overflow-y: auto;
    }

    #panel-type {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #c8a96e;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #panel-name {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.3;
      color: #f0ece4;
      margin-bottom: 6px;
    }

    #panel-meta {
      font-size: 12px;
      color: rgba(232,228,220,0.35);
      letter-spacing: 0.06em;
      margin-bottom: 20px;
    }

    #panel-divider {
      width: 24px;
      height: 1px;
      background: rgba(200,169,110,0.4);
      margin-bottom: 20px;
    }

    #panel-desc {
      font-size: 14px;
      line-height: 1.85;
      color: rgba(232,228,220,0.7);
    }

    #panel-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      color: rgba(232,228,220,0.6);
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      z-index: 10;
    }

    #panel-close:hover {
      background: rgba(200,169,110,0.2);
      color: #e8e4dc;
    }

    /* ── 底部提示 ── */
    #hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(232,228,220,0.25);
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    /* ── Leaflet 覆盖 ── */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: none !important;
    }
    .leaflet-control-zoom a {
      background: rgba(20,20,20,0.9) !important;
      color: rgba(232,228,220,0.6) !important;
      border: 1px solid rgba(232,228,220,0.1) !important;
      width: 28px !important;
      height: 28px !important;
      line-height: 26px !important;
      font-size: 14px !important;
    }
    .leaflet-control-zoom a:hover {
      background: rgba(200,169,110,0.2) !important;
      color: #e8e4dc !important;
    }
    .leaflet-control-attribution {
      background: rgba(0,0,0,0.4) !important;
      color: rgba(255,255,255,0.2) !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: rgba(255,255,255,0.25) !important; }
  </style>
</head>
<body>

<!-- 地图容器 -->
<div id="map"></div>

<!-- 顶部品牌栏 -->
<header id="header">
  <div id="brand">
    <div id="logo-mark">YS</div>
    <div id="brand-name">YOUR STUDIO</div>
  </div>
  <div id="project-count">— 项目地图</div>
</header>

<!-- 项目卡片面板 -->
<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <img id="panel-image" src="" alt="项目图片">
  <div id="panel-body">
    <div id="panel-type"></div>
    <div id="panel-name"></div>
    <div id="panel-meta"></div>
    <div id="panel-divider"></div>
    <div id="panel-desc"></div>
  </div>
</div>

<!-- 底部提示 -->
<div id="hint">点击地图上的点位查看项目详情</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // ── 初始化地图 ──
  const map = L.map('map', {
    center: [35.5, 110],
    zoom: 5,
    zoomControl: true,
    attributionControl: true
  });

  // 深色底图（CartoDB Dark Matter）
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 18
  }).addTo(map);

  // ── 加载项目数据 ──
  let activeMarkerEl = null;

  fetch('projects.json')
    .then(r => r.json())
    .then(projects => {
      document.getElementById('project-count').textContent = `— ${projects.length} 个项目`;

      projects.forEach(p => {
        // 自定义 marker HTML
        const icon = L.divIcon({
          className: '',
          html: `
            <div class="custom-marker">
              <div class="marker-dot" id="dot-${p.id}"></div>
              <div class="marker-city">${p.city}</div>
            </div>`,
          iconSize: [12, 12],
          iconAnchor: [6, 6]
        });

        const marker = L.marker([p.lat, p.lng], { icon }).addTo(map);

        marker.on('click', () => {
          // 重置上一个 active marker
          if (activeMarkerEl) activeMarkerEl.classList.remove('active');
          const dot = document.getElementById(`dot-${p.id}`);
          dot.classList.add('active');
          activeMarkerEl = dot;

          openPanel(p);

          // 地图平移，让点位偏左（为右侧面板留空间）
          map.panTo([p.lat, p.lng - 3], { animate: true, duration: 0.5 });
        });
      });
    })
    .catch(() => {
      console.warn('无法加载 projects.json，请确保文件与 index.html 在同一目录');
    });

  // ── 面板开关 ──
  function openPanel(p) {
    document.getElementById('panel-type').textContent = p.type;
    document.getElementById('panel-name').textContent = p.name;
    document.getElementById('panel-meta').textContent = `${p.city}  ·  ${p.year}`;
    document.getElementById('panel-desc').textContent = p.description;

    const img = document.getElementById('panel-image');
    if (p.image) {
      img.src = p.image;
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }

    document.getElementById('panel').classList.add('open');
    document.getElementById('hint').style.opacity = '0';
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('open');
    if (activeMarkerEl) {
      activeMarkerEl.classList.remove('active');
      activeMarkerEl = null;
    }
    document.getElementById('hint').style.opacity = '1';
  }

  // 点击地图空白处关闭面板
  map.on('click', closePanel);
</script>
</body>
</html>
